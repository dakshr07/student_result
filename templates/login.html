<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

/* HEADER */
.header {
    background: white;
    padding: 10px;
    display: flex;
    align-items: center;
}

.header img {
    width: 60px;
    margin-right: 10px;
}

.header h3 {
    margin: 0;
}

/* LOGIN BOX */
.container {
    max-width: 350px;
    margin: 60px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.container h2 {
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}

button:hover {
    background: darkred;
}
    .top-header {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #f5f5f5;
    padding: 20px;
}

.logo-img {
    width: 80px;
}

.college-text h2 {
    margin: 0;
    font-size: 28px;
}

.college-text p {
    margin: 0;
    color: gray;
}

.main-title {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 40px;
}

.red-bar {
    width: 10px;
    height: 60px;
    background: red;
}

.main-title h1 {
    font-size: 32px;
    font-weight: normal;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="top-header">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img">

    <div class="college-text">
        <h2>Maharaja Institute of Technology Mysore</h2>
        <p>An Autonomous Institution Affiliated to VTU</p>
    </div>
</div>
    <div class="main-title">
    <div class="red-bar"></div>

    <h1>
        Odd semester 2025-26 Dec/Jan - <br>
        Provisional Results
    </h1>
</div>
<!-- LOGIN FORM -->
<div class="container">
    <h2>Student Login</h2>

    <form action="/result" method="post">
        <input type="text" name="usn" placeholder="Enter USN" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Get Result</button>
    </form>
</div>

</body>
</html>
