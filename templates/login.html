<!DOCTYPE html>
<html>
<head>

<style>

    background: linear-gradient(to right, #ff416c, #ff4b2b);

.box {

}

    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h2>Maharaja Institute Of Technology Mysore</h2>
<h3>Student Login</h3>

<div class="box">
<form action="/result" method="post">
<input name="usn" placeholder="Enter USN"><br>
<input type="password" name="password" placeholder="Enter Password"><br>
<button>Result</button>
</form>
</div>

</body>
</html>
